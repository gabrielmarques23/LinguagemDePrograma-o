<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM Multimarcas | Vendas</title>

</head>

<body>
    <div class="container">
        <img src="img/PorschePanamera4.jpg" alt="Porsche Panamera 2026" class="imagem-topo">

        <h1>Modelos de Carros em Estoque | Vendas</h1>
        <p class="descricao">
            Tabelas de veículos disponíveis em estoque, multimarcas!
        </p>

        <table>
            <thead>
                <tr>
                    <th class="col-marca">Marca</th>
                    <th class="col-modelo">Marca</th>
                    <th class="col-ano">Marca</th>
                </tr>
            </thead>
            <!--Início tbody-->
            <tbody>
                <!-- Veículos Porsche -->
                <tr>
                    <td rowspan="2">Porsche</td>
                    <td>
                        <div class="imagem-carros">
                            <img src="img/PorscheTaycanGT.jpg" alt="Porsche Taycan 4 2026">
                            <span>Porsche</span>
                        </div>
                    </td>
                    <td>2026</td>
                </tr>

                <tr>
                    <td>
                        <div class="imagem-carros">
                            <img src="img/Porsche911TurboS.jpg" alt="Porsche 911 Turbo S 2026">
                            <span>Porsche</span>
                        </div>
                    </td>
                    <td>2026</td>
                </tr>
                <!-- Fim veículos Porsche -->

                <!-- Veículos BMW -->
                <tr>
                    <td rowspan="3">Porsche</td>
                    <td>
                        <div class="imagem-carros">
                            <img src="img/BMW320i2025.jpg" alt="BMW 320i 2025">
                            <span>BMW</span>
                        </div>
                    </td>
                    <td>2025</td>
                </tr>

                <tr>
                    <td>
                        <div class="imagem-carros">
                            <img src="img/BMWm4Competition2022.jpg" alt="BMW M4 Competition 2022">
                            <span>BMW</span>
                        </div>
                    </td>
                    <td>2022</td>
                </tr>

                <tr>
                    <td>
                        <div class="imagem-carros">
                            <img src="img/BMW323i1981.jpg" alt="BMW Série 323i 1981">
                            <span>BMW</span>
                        </div>
                    </td>
                    <td>1981</td>
                </tr>
                <!-- Fim veículos BMW -->

                <!-- Início Aston Martin -->
                <tr>
                    <td>Aston Martin</td>
                    <td>
                        <div class="imagem-carros">
                            <img src="img/AstonMartinVantage2018.jpg" alt="Aston Martin Vantage 2018">
                            <span>Aston Martin</span>
                        </div>
                    </td>
                    <td>2018</td>
                </tr>
                <!-- Fim Aston Martin -->
            </tbody>

            <!-- Início tfoot -->
            <tfoot>
                <tr>
                    <td colspan="3">Última atualização: 27/03/2026</td>
                </tr>
            </tfoot>
            <!-- Fim tfoot -->
        </table>

        <imgs class="rodape-image" rc="img/logoTsl.png" alt="Logomarca da Loja Max Multimarcas">

    </div>


</body>

</html>
