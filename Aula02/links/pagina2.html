<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background-color: white;
            margin-top: 40px;
        }

        a {
            color: rgb(43, 43, 43);
            text-decoration: none;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 20px;
            border-radius: 9px;
            border: solid 1px #888888;
            padding: 10px;
            margin-right: 10px;

        }

        a:hover {
            background-color: rgb(0, 80, 0);
            color: rgb(255, 255, 255);
            font-size: 20px;
            transition: 0.3s;
            box-shadow:  3px 4px 6px rgb(141, 141, 141);
            border-radius: 11px;
            border-bottom: solid 2px rgb(51, 51, 51);
            text-decoration: none;
        }
    </style>

    <title>Minha segunda página de links com CSS incorporado</title>
</head>

<body>

    <a href="pagina1.html" target="_self">Página 1</a>
    <a href="pagina2.html" target="_top">Página 2</a>
    <a href="https://www.facens.br/" target="_blank">UniFacens</a>

</body>

</html>
